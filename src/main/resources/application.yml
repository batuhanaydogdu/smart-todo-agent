spring:
  application:
    name: smart-todo-agent

  datasource:
    # file: → veriler ./data/ klasörüne yazılır, restart'ta kaybolmaz
    # mem:  → in-memory, restart'ta sıfırlanır (önceki hali)
    url: jdbc:h2:file:./data/tododb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      # update: mevcut tabloları koru, yeni alanlar ekle — veriler kaybolmaz
      # create-drop: her restart'ta sıfırla (önceki hali)
      ddl-auto: update
    show-sql: true

  ai:
    # ─── CLAUDE (Anthropic) ─────────────────────────────────────────────────
    # Claude kullanmak için ANTHROPIC_API_KEY set et ve bu bloğu aç.
    # anthropic:
    #   api-key: ${ANTHROPIC_API_KEY:}
    #   chat:
    #     options:
    #       model: claude-sonnet-4-6

    # ─── OLLAMA (Lokal / Gemma4) ─────────────────────────────────────────────
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: gemma4:e4b
          stream: false
      embedding:
        options:
          model: nomic-embed-text

    # ─── MCP SERVER ──────────────────────────────────────────────────────────
    mcp:
      server:
        name: smart-todo-server
        version: 1.0.0
        # Araçlar MCP endpoint'i: http://localhost:8080/mcp
        # Claude Code .claude/settings.json'a ekle:
        #   { "mcpServers": { "todo": { "url": "http://localhost:8080/mcp" } } }

server:
  port: 8080

logging:
  level:
    org.springframework.ai: DEBUG
